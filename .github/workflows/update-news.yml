name: Update Nana News

on:
  schedule:
    - cron: "25 0 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - uses: actions/configure-pages@v5
      - run: pip install -r requirements.txt
      - run: python src/run_daily.py --dry-run
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DEEPSEEK_BASE_URL: https://api.deepseek.com
          NANA_NEWS_PASSWORD: ${{ secrets.NANA_NEWS_PASSWORD }}
      - run: python src/export_static_site.py
        env:
          NANA_NEWS_PASSWORD: ${{ secrets.NANA_NEWS_PASSWORD }}
      - uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
